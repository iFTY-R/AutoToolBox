name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional tag to publish (e.g. v3.2.0)
        required: false
        type: string
      release_name:
        description: Optional release title (defaults to tag)
        required: false
        type: string
      release_body:
        description: Optional release notes body (if empty, auto-generate notes)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare_tag:
    name: Prepare Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and create tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          input_tag="${{ github.event.inputs.tag || '' }}"
          created="false"

          if [ -n "$input_tag" ]; then
            tag="$input_tag"
            if git rev-parse "$tag" >/dev/null 2>&1; then
              tag_commit="$(git rev-list -n 1 "$tag")"
              if [ "$tag_commit" != "$GITHUB_SHA" ]; then
                echo "Tag $tag already exists at $tag_commit, current commit is $GITHUB_SHA."
                exit 1
              fi
              echo "Tag $tag already exists on current commit, will reuse."
            else
              created="true"
            fi
          else
            current_tag="$(git tag --points-at "$GITHUB_SHA" --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
            if [ -n "$current_tag" ]; then
              tag="$current_tag"
            else
              latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
              if [ -z "$latest" ]; then
                major=1
                minor=0
                patch=0
              else
                version="${latest#v}"
                IFS='.' read -r major minor patch <<< "$version"
                patch=$((patch + 1))
              fi

              tag="v${major}.${minor}.${patch}"
              while git rev-parse "$tag" >/dev/null 2>&1; do
                patch=$((patch + 1))
                tag="v${major}.${minor}.${patch}"
              done
              created="true"
            fi
          fi

          if [ "$created" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "created=$created" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.goarch }}
    needs: prepare_tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [386, amd64, arm64, arm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        shell: bash
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.prepare_tag.outputs.tag }}
        run: |
          set -euo pipefail
          out_dir="dist/tbm-windows-${GOARCH}"
          mkdir -p "${out_dir}"
          go build -trimpath \
            -ldflags="-X main.Version=${VERSION}" \
            -o "${out_dir}/tbm.exe" \
            ./cmd/tbm

      - name: Package artifact
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.prepare_tag.outputs.tag }}
        run: |
          set -euo pipefail
          pushd "dist/tbm-windows-${GOARCH}" >/dev/null
          zip "../tbm-${VERSION}-windows-${GOARCH}.zip" tbm.exe
          popd >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goarch }}
          path: dist/tbm-${{ needs.prepare_tag.outputs.tag }}-windows-${{ matrix.goarch }}.zip
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [prepare_tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum *.zip > checksums.txt

      - name: Publish GitHub Release (Custom Notes)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_body != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_tag.outputs.tag }}
          name: ${{ github.event.inputs.release_name || needs.prepare_tag.outputs.tag }}
          body: ${{ github.event.inputs.release_body }}
          files: |
            release-assets/*.zip
            release-assets/checksums.txt

      - name: Publish GitHub Release (Auto Notes)
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.release_body != '') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_tag.outputs.tag }}
          name: ${{ github.event.inputs.release_name || needs.prepare_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/checksums.txt
